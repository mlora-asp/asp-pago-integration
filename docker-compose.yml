services:
  asp-pago-integration:
    build: .
    container_name: asp-pago-integration
    ports:
      - "${APP_PORT:-8095}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SECURITY_CRYPTO_ENABLED: ${SECURITY_CRYPTO_ENABLED:-true}
      CRYPTO_SECRET: ${CRYPTO_SECRET:?CRYPTO_SECRET must be configured}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:?GATEWAY_SHARED_SECRET must be configured}
      GATEWAY_ALLOWED_CLIENT_IDS: ${GATEWAY_ALLOWED_CLIENT_IDS:-asp-pagos-auth-service}
      CAUDEX_BASE_URL: ${CAUDEX_BASE_URL:?CAUDEX_BASE_URL must be configured}
      CAUDEX_CLIENT_ID: ${CAUDEX_CLIENT_ID:?CAUDEX_CLIENT_ID must be configured}
      CAUDEX_CLIENT_SECRET: ${CAUDEX_CLIENT_SECRET:?CAUDEX_CLIENT_SECRET must be configured}
      CAUDEX_SCOPE: ${CAUDEX_SCOPE:-message.read}
      ASP_PAGO_SUCCESS_CODE: ${ASP_PAGO_SUCCESS_CODE:-9999}
      ASP_PAGO_DEFAULT_CURRENCY: ${ASP_PAGO_DEFAULT_CURRENCY:-MXN}
      ASP_PAGO_DEFAULT_CHANNEL: ${ASP_PAGO_DEFAULT_CHANNEL:-API}
      ASP_PAGO_ONBOARDING_REFERENCE_PREFIX: ${ASP_PAGO_ONBOARDING_REFERENCE_PREFIX:-ONBOARDING-}
      ASP_PAGO_DEFAULT_CHANNEL_CODE: ${ASP_PAGO_DEFAULT_CHANNEL_CODE:-1}
      ASP_PAGO_DEFAULT_INSTRUMENT_CODE: ${ASP_PAGO_DEFAULT_INSTRUMENT_CODE:-1}
      ASP_PAGO_DEFAULT_ACCOUNT_TYPE_CODE: ${ASP_PAGO_DEFAULT_ACCOUNT_TYPE_CODE:-1}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
