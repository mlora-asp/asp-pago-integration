# ──────────────────────────────────────────────────────────────────────────────
# Perfil LOCAL — Entorno de desarrollo en máquina local
#
# Activar con: -Dspring.profiles.active=local
# O en IDE: Edit Run Configuration → Active Profiles → "local"
#
# Para usar Caudex localmente, crear un archivo .env en la raíz del proyecto
# (ya incluido en .gitignore) y exportar las variables requeridas.
#
# NUNCA commitear credenciales reales al repositorio.
# ──────────────────────────────────────────────────────────────────────────────

server:
  port: 8080

spring:
  application:
    name: asp-pago-integration-local

# Proveedores — apuntan a instancias locales o de sandbox
providers:
  caudex:
    base-url: ${CAUDEX_BASE_URL}
    client-id: ${CAUDEX_CLIENT_ID}
    client-secret: ${CAUDEX_CLIENT_SECRET}
    connect-timeout-ms: 10000
    read-timeout-ms: 30000   # Timeout más amplio en local para debugging

# Logging más verbose en local
logging:
  level:
    com.asp.integration: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.web.reactive: DEBUG
